<div class="container">

    <h2>Create Account</h2>

    <form onsubmit="registerUser(event)">

        <input type="text"
        id="name"
        placeholder="Full Name"
        required>

        <br><br>

        <input type="email"
        id="email"
        placeholder="Enter Email"
        required>

        <br><br>

        <input type="password"
        id="password"
        placeholder="Create Password"
        required>

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

</div>

<script src="script.js"></script>
