<div class="container">

    <h2>User Login</h2>

    <form onsubmit="loginUser(event)">

        <input type="email"
        id="email"
        placeholder="Enter Email"
        required>

        <br><br>

        <input type="password"
        id="password"
        placeholder="Enter Password"
        required>
        <p>
           <a href="#" onclick="forgotPassword()">
             Forgot Password?
            </a>
        </p>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</div>
